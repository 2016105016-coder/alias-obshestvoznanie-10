plugins {
    id 'com.android.application'
}

android {
    namespace 'ru.school.aliassociety'
    compileSdk 35

    defaultConfig {
        applicationId 'ru.school.aliassociety'
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName '1.1'

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}
